allowBuilds:
  '@dargmuesli/nuxt-vio': false
  '@firebase/util': false
  '@parcel/watcher': false
  '@sentry-internal/node-cpu-profiler': false
  '@sentry/cli': false
  esbuild: false
  protobufjs: false
  sharp: false
  unrs-resolver: false
  vue-demi: false
minimumReleaseAgeExclude:
  - '@nuxtjs/seo@5.2.6'
  - '@nuxtjs/sitemap@8.2.0'
  - nuxtseo-shared@5.2.6
overrides:
  "@nuxtjs/sitemap": "8.2.0"
packages:
  - src
  - tests
